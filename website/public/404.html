<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Catching the Fall</title>
    <script>
      // GitHub Pages single-page-app redirect trick.
      // On any deep link (e.g. /dropout/policy), GitHub Pages serves this 404.html.
      // We encode the attempted path as a query string and redirect to index.html,
      // where a small companion script in index.html restores the real path.
      (function () {
        var segmentCount = 1; // number of path segments of the repo base to preserve
        var l = window.location;
        l.replace(
          l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
          l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?/' +
          l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
        );
      })();
    </script>
  </head>
  <body>
    Redirecting…
  </body>
</html>
